const GRID=[];

function cellColor(n){ if(n===0) return "#161b22"; if(n<=3) return "#0e4429"; if(n<=6) return "#006d32"; if(n<=9) return "#26a641"; return "#39d353"; }

function findTop(c){ for(let r=0; r<ROWS; r++) if(isGreen(c,r)) return r; return 0; }
function findBot(c){ for(let r=ROWS-1; r>=0; r--) if(isGreen(c,r)) return r; return ROWS-1; }
function findRand(c){ const g=[]; for(let r=0; r<ROWS; r++) if(isGreen(c,r)) g.push(r); return g.length ? g[Math.floor(Math.random()*g.length)] : 3; }
function cx(c){ return GRID_X + c*STEP + CELL/2; }
function cy(r){ return GRID_Y + r*STEP + CELL/2; }
function cty(r){ return GRID_Y + r*STEP; }

// ── Easing ─────────────────────────────────────────────────────────────────
function eio(t){ return t<0.5 ? 2*t*t : 1-Math.pow(-2*t+2,2)/2; }
function eo(t){ return 1-Math.pow(1-t,3); }

// ── Canvas setup ───────────────────────────────────────────────────────────
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

function drawSpr(pix, ox, oy, flip, W){
  for(const [c,r,col] of pix){
    ctx.fillStyle = col;
    const dc = flip ? (W-1-c) : c;
    ctx.fillRect(Math.round(ox + dc*PX), Math.round(oy + r*PX), PX, PX);
  }
}

function drawWeb(ax, ay, bx, by){
  ctx.save();
  ctx.globalAlpha = 0.92;
  ctx.strokeStyle = "#cccccc";
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.moveTo(ax, ay);
  const mx = (ax+bx)/2, my = (ay+by)/2;
  const dx = bx-ax, dy = by-ay;
  const len = Math.sqrt(dx*dx + dy*dy);
  const sag = Math.min(len*0.18, 20);
  ctx.quadraticCurveTo(mx, my+sag, bx, by);
  ctx.stroke();
  ctx.restore();
}

function drawGrid(){
  ctx.fillStyle = "#0d1117"; ctx.fillRect(0, 0, CVW, CVH);
  ctx.fillStyle = "#768390"; ctx.font = "10px monospace";
  const M = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
  for(let i=0; i<12; i++) ctx.fillText(M[i], GRID_X + Math.round(i*(COLS/12))*STEP, GRID_Y-10);
  ctx.font = "9px monospace";
  const D = ["","Mon","","Wed","","Fri",""];
  for(let d=0; d<ROWS; d++) if(D[d]) ctx.fillText(D[d], 4, GRID_Y + d*STEP + CELL - 2);
  for(let w=0; w<COLS; w++) for(let d=0; d<ROWS; d++){
    ctx.fillStyle = cellColor(GRID[w][d]);
    ctx.beginPath();
    ctx.roundRect(GRID_X + w*STEP, GRID_Y + d*STEP, CELL, CELL, 6);
    ctx.fill();
  }
}

// ── Goblin bounds ──────────────────────────────────────────────────────────
const GOBLIN_Y_TOP = GRID_Y - GH*PX*0.5 + 2;
const GOBLIN_Y_BOT = GRID_Y + (ROWS-1)*STEP - GH*PX*0.5 + CELL - 2;
const GOBLIN_Y_MID = (GOBLIN_Y_TOP + GOBLIN_Y_BOT) / 2;
const GOBLIN_Y_AMP = (GOBLIN_Y_BOT - GOBLIN_Y_TOP) / 4;
const GOBLIN_ZIG_SPEED = (2*Math.PI) / 180;
let gZigT = 0;

// ── Build waypoints ───────────────────────────────────────────────────────
function buildPath(fromLeft){
  const NUM = 11;
  const path = [];
  for(let i=0; i<NUM; i++){
    const t = i/(NUM-1);
    let col = Math.round(fromLeft ? 3+t*(COLS-7) : (COLS-4)-t*(COLS-7));
    col = Math.max(2, Math.min(COLS-3, col));
    for(let off=0; off<6; off++){
      if(isGreen(col, findBot(col))) break;
      if(isGreen(col+off, findBot(col+off))){ col = col+off; break; }
      if(isGreen(col-off, findBot(col-off))){ col = col-off; break; }
    }
    path.push(col);
  }
  return path;
}

// ── Timing: FAST goblin, ORIGINAL spiderman + 2-3s extra ──────────────────
const FPS = 60;
const G_HOP = 1.2 * FPS;
const G_EXIT = 1.0 * FPS;
const SP_ENTER_DUR = 3.0 * FPS;
const SP_SWING_DUR = 3.5 * FPS;
const SP_HANG_DUR = 2.0 * FPS;  // was 2.8 — now ~5s for longer appearance
const SP_EXIT_DUR = 5.0 * FPS;

// ── State ─────────────────────────────────────────────────────────────────
let phase = "INIT", timer = 0;
let gPath = [], gStop = 0, gFlip = false, gFromLeft = true;
let gX = 0, gY = 0, gFromX = 0, gToX = 0;
let spX = 0, spY = 0, spFlip = false;
let spFromX = 0, spFromY = 0, spToX = 0, spToY = 0;
let spWebAX = 0, spWebAY = 0;
let spHCol = 0, spHRow = 0;
let spStop = 0;
let spHangT = 0;
let waitT = 0;

// ── Find nearest green cell for web anchor ────────────────────────────────
function findNearestGreenCol(x) {
  let col = Math.round((x - GRID_X) / STEP);
  col = Math.max(0, Math.min(COLS-1, col));
  if (isGreen(col, findBot(col))) return col;
  for (let off = 1; off < COLS; off++) {
    if (col + off < COLS && isGreen(col + off, findBot(col + off))) return col + off;
    if (col - off >= 0 && isGreen(col - off, findBot(col - off))) return col - off;
  }
  return col;
}

function getWebAnchorFromCol(col) {
  const topRow = findTop(col);
  return { x: cx(col), y: cty(topRow) + 2 };
}

function goblinXForCol(col){ return cx(col) - GW*PX*0.5; }

function initGoblin(){
  phase = "GOBLIN"; timer = 0; gStop = 0; gZigT = 0;
  gFromLeft = Math.random() < 0.5;
  gFlip = !gFromLeft;
  gPath = buildPath(gFromLeft);
  gY = GOBLIN_Y_MID;
  gX = gFromLeft ? (-GW*PX - 10) : (CVW + 10);
  gFromX = gX;
  gToX = goblinXForCol(gPath[0]);
  createOrbitingBombs(); bombsDropped = 0;
}

function spiderEnter(){
  phase = "SP_ENTER"; timer = 0;
  spFlip = !gFromLeft;
  spStop = 1;
  spHCol = gPath[0];
  spHRow = findBot(spHCol);
  spFromX = gFromLeft ? (-SWW*PX - 10) : (CVW + SWW*PX + 10);
  spFromY = GRID_Y - 10;
  spToX = cx(spHCol) - HW*PX*0.5;
  spToY = cy(spHRow) - HH*PX*0.5;
  const anchor = getWebAnchorFromCol(spHCol);
  spWebAX = anchor.x;
  spWebAY = anchor.y;
}

function spiderHang(){
  phase = "SP_HANG"; timer = 0;
  spX = cx(spHCol) - HW*PX*0.5;
  spY = cy(spHRow) - HH*PX*0.5;
  const anchor = getWebAnchorFromCol(spHCol);
  spWebAX = anchor.x;
  spWebAY = anchor.y;
}

function spiderSwing(){
  phase = "SP_SWING"; timer = 0;
  const prevCol = spHCol;
  let goLeft = Math.random() < 0.5;
  let off = 18 + Math.floor(Math.random() * 25);
  let nc = prevCol + (goLeft ? -off : off);

  if (prevCol <= 8) { goLeft = false; nc = prevCol + off; }
  else if (prevCol >= COLS - 9) { goLeft = true; nc = prevCol - off; }

  nc = Math.max(5, Math.min(COLS - 6, nc));
  spHCol = nc;
  spHRow = findBot(spHCol);
  spFlip = spHCol < prevCol;
  spFromX = spX; spFromY = spY;
  spToX = cx(spHCol) - HW*PX*0.5;
  spToY = cy(spHRow) - HH*PX*0.5;
  const mC = Math.max(0, Math.min(COLS-1, Math.round((prevCol + spHCol)/2)));
  const anchor = getWebAnchorFromCol(mC);
  spWebAX = anchor.x;
  spWebAY = anchor.y;
}

function spiderExit(){
  phase = "SP_EXIT"; timer = 0;
  spFromX = spX; spFromY = spY;
  // Pick exit direction
  const exitLeft = Math.random() < 0.5;
  // Swing far off-screen in that direction
  spToX = exitLeft ? (-SWW*PX - 120) : (CVW + SWW*PX + 120);
  spToY = GRID_Y - 100;
  // Web anchor: placed OUTSIDE the grid in the exit direction, above and visible
  // This looks like he shot web to a point outside the square array
  if (exitLeft) {
    spWebAX = GRID_X - 40;      // left of first column
    spWebAY = GRID_Y - 60;      // above the grid
  } else {
    spWebAX = GRID_X + COLS*STEP + 40;  // right of last column
    spWebAY = GRID_Y - 60;      // above the grid
  }
  // Face the exit direction
  // spFlip=false = unflipped = faces LEFT
  // spFlip=true = flipped = faces RIGHT
  spFlip = !exitLeft;
}


// ── Explosion system ──────────────────────────────────────────────────────
let explosions = [];
function createExplosion(x, y) {
  const particles = [];
  for(let i=0; i<20; i++) {
    const angle = (Math.PI*2*i)/20 + Math.random()*0.8;
    const speed = 1.5 + Math.random()*4;
    particles.push({ x, y, vx: Math.cos(angle)*speed, vy: Math.sin(angle)*speed - 1.5,
      life: 25 + Math.floor(Math.random()*15), size: 2 + Math.floor(Math.random()*3),
      color: Math.random()<0.4 ? "#ff3300" : (Math.random()<0.6 ? "#ff8800" : "#ffcc00") });
  }
  explosions.push({particles, shockwave: {x, y, radius: 0, maxRadius: 35, alpha: 1}});
}
function updateExplosions() {
  for(let i=explosions.length-1; i>=0; i--) {
    const ex = explosions[i];
    for(const p of ex.particles) { p.x+=p.vx; p.y+=p.vy; p.vy+=0.12; p.life--; }
    ex.particles = ex.particles.filter(p => p.life > 0);
    if(ex.shockwave) { ex.shockwave.radius+=2.5; ex.shockwave.alpha-=0.04; if(ex.shockwave.alpha<=0) ex.shockwave=null; }
    if(ex.particles.length===0 && !ex.shockwave) explosions.splice(i,1);
  }
}
function drawExplosions() {
  for(const ex of explosions) {
    if(ex.shockwave) {
      ctx.save(); ctx.globalAlpha=ex.shockwave.alpha*0.6; ctx.strokeStyle="#ff6600"; ctx.lineWidth=2;
      ctx.beginPath(); ctx.arc(ex.shockwave.x,ex.shockwave.y,ex.shockwave.radius,0,Math.PI*2); ctx.stroke(); ctx.restore();
    }
    for(const p of ex.particles) {
      ctx.globalAlpha=Math.min(1,p.life/15); ctx.fillStyle=p.color;
      ctx.fillRect(Math.round(p.x-p.size/2),Math.round(p.y-p.size/2),p.size,p.size);
    }
  }
  ctx.globalAlpha=1;
}

// ── Bomb system ────────────────────────────────────────────────────────────
let orbitingBombs = [];
let fallingBombs = [];
let bombsDropped = 0;

function createOrbitingBombs() {
  orbitingBombs = [];
  for(let i=0; i<6; i++) orbitingBombs.push({ angle:(Math.PI*2*i)/6, speed:0.025+Math.random()*0.015, radius:45+Math.random()*10, offsetY:Math.random()*8 });
}
function updateOrbitingBombs(gx, gy) { for(const b of orbitingBombs) b.angle+=b.speed; }
function drawOrbitingBombs(gx, gy) {
  const cx2=gx+GW*PX*0.5, cy2=gy+GH*PX*0.5;
  for(const b of orbitingBombs) {
    const bx=cx2+Math.cos(b.angle)*b.radius, by=cy2+Math.sin(b.angle)*b.radius*0.55+b.offsetY;
    drawSpr(SPR_BOMB, bx-BW*PX*0.5, by-BH*PX*0.5, false, BW);
  }
}
function tossBomb(gx, gy) {
  const centerX=gx+GW*PX*0.5, centerY=gy+GH*PX*0.3;
  let tc, tr, attempts=0;
  do { tc=Math.floor(Math.random()*COLS); tr=Math.floor(Math.random()*ROWS); attempts++; } while(GRID[tc][tr]===0 && attempts<100);
  fallingBombs.push({ x:centerX, y:centerY, targetX:cx(tc), targetY:cy(tr), targetCol:tc, targetRow:tr, progress:0, speed:0.006+Math.random()*0.004, tossHeight:40+Math.random()*50 });
}
function updateFallingBombs() {
  for(let i=fallingBombs.length-1; i>=0; i--) {
    const b=fallingBombs[i]; b.progress+=b.speed;
    if(b.progress>=1) {
      createExplosion(b.targetX, b.targetY);
      for(let dc=-2;dc<=2;dc++) for(let dr=-2;dr<=2;dr++) { const c=b.targetCol+dc, r=b.targetRow+dr; if(c>=0&&c<COLS&&r>=0&&r<ROWS) GRID[c][r]=0; }
      fallingBombs.splice(i,1);
    }
  }
}
function drawFallingBombs() {
  for(const b of fallingBombs) {
    const t=b.progress, x=b.x+(b.targetX-b.x)*t, arc=4*b.tossHeight*t*(1-t), y=b.y+(b.targetY-b.y)*t-arc;
    drawSpr(SPR_BOMB, x-BW*PX*0.5, y-BH*PX*0.5, false, BW);
    ctx.fillStyle="#ff4400"; ctx.globalAlpha=0.7*(1-t);
    for(let tr2=0;tr2<4;tr2++) ctx.fillRect(Math.round(x-1),Math.round(y+BH*PX+tr2*3),3,2);
    ctx.globalAlpha=1;
  }
}
function tryDropBomb(gx, gy) {
  if(bombsDropped>=3 || orbitingBombs.length===0) return;
  bombsDropped++; orbitingBombs.pop(); tossBomb(gx, gy);
}

// ── Main loop ─────────────────────────────────────────────────────────────
let raf;
function tick(){
  drawGrid();
  timer++;

  updateExplosions(); updateFallingBombs();

  if(phase === "INIT"){
    initGoblin();
  }

  else if(phase === "GOBLIN"){
    const p = Math.min(timer / G_HOP, 1);
    gX = gFromX + (gToX - gFromX) * eio(p);
    gZigT++;
    gY = GOBLIN_Y_MID + Math.sin(gZigT * GOBLIN_ZIG_SPEED) * GOBLIN_Y_AMP;
    updateOrbitingBombs(gX, gY);
    drawOrbitingBombs(gX, gY);
    if(bombsDropped===0 && p>=0.3 && p<=0.5) tryDropBomb(gX, gY);
    if(bombsDropped===1 && gStop>=4 && gStop<=6 && p>=0.3 && p<=0.5) tryDropBomb(gX, gY);
    drawSpr(SPR_GOBLIN, gX, gY, gFlip, GW);
    if(p >= 1){
      gStop++;
      if(gStop < gPath.length){
        gFromX = gX;
        gToX = goblinXForCol(gPath[gStop]);
        timer = 0;
        createOrbitingBombs();
      } else {
        phase = "GOBLIN_EXIT"; timer = 0;
        gFromX = gX;
        gToX = gFromLeft ? (CVW + GW*PX + 20) : (-GW*PX - 20);
      }
    }
  }

  else if(phase === "GOBLIN_EXIT"){
    const p = Math.min(timer / G_EXIT, 1);
    gX = gFromX + (gToX - gFromX) * eio(p);
    gZigT++;
    gY = GOBLIN_Y_MID + Math.sin(gZigT * GOBLIN_ZIG_SPEED) * GOBLIN_Y_AMP;
    updateOrbitingBombs(gX, gY);
    drawOrbitingBombs(gX, gY);
    if(bombsDropped===2 && p>=0.3 && p<=0.6) tryDropBomb(gX, gY);
    drawSpr(SPR_GOBLIN, gX, gY, gFlip, GW);
    if(p >= 1) spiderEnter();
  }

  else if(phase === "SP_ENTER"){
    const p = Math.min(timer / SP_ENTER_DUR, 1);
    const ep = eio(p);
    spX = spFromX + (spToX - spFromX) * ep;
    spY = spFromY + (spToY - spFromY) * ep - Math.sin(p * Math.PI) * 60;
    drawWeb(spWebAX, spWebAY, spFlip ? spX + 2*PX : spX + (SWW-3)*PX, spY + 3*PX);
    drawSpr(SPR_SWING, spX, spY, spFlip, SWW);
    if(p >= 1) spiderHang();
  }

  else if(phase === "SP_HANG"){
    const sway = Math.sin(timer * 0.06) * 12;
    const bob = Math.sin(timer * 0.04) * 3;
    const curX = spX + sway, curY = spY + bob;
    drawWeb(spWebAX, spWebAY, curX + HW*PX*0.5, curY + HH*PX*0.5);
    drawSpr(SPR_HANG, curX, curY, sway < -2, HW);
    if(timer >= SP_HANG_DUR){
      spStop++;
      if(spStop >= 10) spiderExit();
      else spiderSwing();
    }
  }

  else if(phase === "SP_SWING"){
    const p = Math.min(timer / SP_SWING_DUR, 1);
    const ep = eio(p);
    spX = spFromX + (spToX - spFromX) * ep;
    const arc = Math.sin(p * Math.PI) * 50 + Math.sin(p * Math.PI * 2) * 8;
    spY = spFromY + (spToY - spFromY) * ep - arc;
    drawWeb(spWebAX, spWebAY, spFlip ? spX + 2*PX : spX + (SWW-3)*PX, spY + 4*PX);
    drawSpr(SPR_SWING, spX, spY, spFlip, SWW);
    if(p >= 1) spiderHang();
  }

  else if(phase === "SP_EXIT"){
    const p = Math.min(timer / SP_EXIT_DUR, 1);
    const ep = eo(p);
    spX = spFromX + (spToX - spFromX) * ep;
    spY = spFromY + (spToY - spFromY) * ep - Math.sin(p * Math.PI) * 80;
    // Thick visible web going from his hand to outside the grid
    ctx.save();
    ctx.globalAlpha = 0.9;
    ctx.strokeStyle = "#dddddd";
    ctx.lineWidth = 2.0;
    ctx.beginPath();
    ctx.moveTo(spWebAX, spWebAY);
    const handX = spFlip ? spX + 2*PX : spX + (SWW-3)*PX;
    const handY = spY + 3*PX;
    const mx = (spWebAX + handX) / 2;
    const my = (spWebAY + handY) / 2;
    ctx.quadraticCurveTo(mx, my + 10, handX, handY);
    ctx.stroke();
    ctx.restore();
    drawSpr(SPR_SWING, spX, spY, spFlip, SWW);
    if(p >= 1){ phase = "WAIT"; waitT = 2.5 * FPS; timer = 0; }
  }

  else if(phase === "WAIT"){
    waitT--;
    if(waitT <= 0) initGoblin();
  }

  drawFallingBombs(); drawExplosions();

  raf = requestAnimationFrame(tick);
}

drawGrid();
raf = requestAnimationFrame(tick);
</script>
