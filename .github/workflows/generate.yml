name: 🕷️ Generate Spiderman GIF

on:
  schedule:
    - cron: "0 1 * * *"
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "scripts/animation.html"

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install system deps first
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            chromium-browser \
            libcairo2-dev libpango1.0-dev libjpeg-dev libgif-dev librsvg2-dev

      - name: Install Node dependencies (skip Puppeteer Chrome download)
        run: npm install
        env:
          PUPPETEER_SKIP_DOWNLOAD: "true"
          PUPPETEER_EXECUTABLE_PATH: "/usr/bin/chromium-browser"

      - name: Inject real GitHub contribution data
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_USERNAME: 4-thkind
        run: node scripts/inject_real_data.js

      - name: Record animation as GIF
        env:
          PUPPETEER_EXECUTABLE_PATH: "/usr/bin/chromium-browser"
        run: node scripts/record.js

      - name: Commit and push GIF
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add spiderman.gif
          git diff --staged --quiet || git commit -m "🕷️ update spiderman gif [$(date +'%Y-%m-%d')]"
          git push
