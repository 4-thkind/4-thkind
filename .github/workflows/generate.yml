name: 🕷️ Generate Spiderman GIF

on:
  schedule:
    - cron: "0 1 * * *"   # every day at 1am UTC
  workflow_dispatch:        # manual trigger anytime
  push:
    branches: [main]
    paths:
      - "scripts/animation.html"  # re-generate if animation changes

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install
      - name: Install system deps for canvas + puppeteer
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libcairo2-dev libpango1.0-dev libjpeg-dev libgif-dev librsvg2-dev \
            libnss3 libatk1.0-0 libatk-bridge2.0-0 libcups2 libdrm2 \
            libxkbcommon0 libxcomposite1 libxdamage1 libxfixes3 \
            libxrandr2 libgbm1 libasound2

      - name: Inject real GitHub contribution data
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_USERNAME: 4-thkind
        run: node scripts/inject_real_data.js

      - name: Record animation as GIF
        run: node scripts/record.js

      - name: Commit and push GIF
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add spiderman.gif
          git diff --staged --quiet || git commit -m "🕷️ update spiderman gif [$(date +'%Y-%m-%d')]"
          git push
